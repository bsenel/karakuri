name: discovery
version: 1
constraints:
  - tdd_required
checkpoints:
  - before: discovery_complete
    summary: "Discovery complete. Proceed to delivery?"
roles:
  - role: TechLead
    provider: claude
    temperature: 0.2
    parallel: false
    artifacts_out: [technical-design]
  - role: SeniorQAEngineer
    provider: claude
    temperature: 0.2
    parallel: false
    depends_on: [TechLead]
    artifacts_out: [test-plan]
  - role: APIArchitect
    provider: claude
    temperature: 0.2
    parallel: false
    depends_on: [TechLead]
    artifacts_out: [api-spec]
