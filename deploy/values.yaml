image:
  repository: karakuri
  tag: latest
  pullPolicy: Never

nameOverride: ""
fullnameOverride: ""

replicaCount: 1

service:
  type: NodePort
  port: 8080
  nodePort: 30080

storage:
  size: 5Gi
  storageClassName: standard

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 512Mi

secret:
  name: karakuri-secrets

probes:
  livenessPath: /api/v1/health
  readinessPath: /api/v1/health

# PostgreSQL backend (Phase 8). When enabled, the chart wires DATABASE_DRIVER=
# postgres and a DSN constructed from these fields into the Karakuri container,
# overriding deploy/karakuri.yaml's defaults. The password is pulled from a
# referenced Secret rather than inlined.
#
# Set memory.vectorBackend to "pgvector" to enable real similarity recall;
# the backend creates the `vector` extension + `memory_semantic_vec` table on
# first boot (the Postgres role must have CREATE EXTENSION privileges).
postgresql:
  enabled: false
  host: ""
  port: 5432
  database: karakuri
  user: karakuri
  sslmode: disable
  passwordSecret:
    name: ""   # Secret containing the password (created out of band)
    key: password

memory:
  vectorBackend: ""   # "" | "sqlite-keyword" | "pgvector"
  embeddingDim: 1536

# Distributed execution (Phase 11). The Karakuri server image is also a worker:
# loops persist their iteration boundaries to the DB and any non-completed
# state is replayed on startup, so scaling replicaCount past 1 yields workers
# that pick up stranded loops from a crashed peer. The Restate/Celery
# executors are activated via env vars (RESTATE_INGRESS_URL or
# CELERY_BROKER_URL); leaving them empty keeps the local-goroutine fallback.
worker:
  enabled: false
  replicaCount: 1
  restate:
    ingressUrl: ""   # e.g. http://restate.restate.svc.cluster.local:8080
    service: "Karakuri.Task"
    handler: "Run"
  celery:
    brokerUrl: ""    # e.g. redis://redis.celery.svc.cluster.local:6379/0
    queue: "celery"
    taskName: "karakuri.run_task"

# Observability fan-out (Phase 12 + extensions). The local file exporter is
# always on and writes to /data/obs/{metrics,logs}/<YYYY-MM-DD>/<kind>-NNNNN.<ext>
# with the rotation limits from observability.rotation. Remote exporters
# activate when the matching credential env vars are present in karakuri-secrets:
#
#   DD_API_KEY                          → Datadog metrics + logs
#   AWS_REGION + AWS_S3_LOG_BUCKET      → CloudWatch metrics + S3 log archive
#   NEW_RELIC_LICENSE_KEY               → New Relic metrics + logs
#   ELASTICSEARCH_URL + USERNAME/PASS   → Elasticsearch _bulk (ELK stack)
#   LOKI_URL + (USERNAME/PASS|TOKEN)    → Grafana Loki logs
#   OTEL_EXPORTER_OTLP_ENDPOINT         → OpenTelemetry Collector (OTLP/HTTP)
#
# All remote exporters are wrapped in RetryExporter (3 attempts, exp backoff)
# so transient blips don't drop batches. Prometheus is pull-based: enabling
# it exposes GET /metrics publicly on the server port (Prometheus scrapers
# don't authenticate). Optional PROMETHEUS_PUSHGATEWAY_URL adds push mode.
observability:
  formats:
    metrics: ndjson      # ndjson | csv | parquet | json
    logs:    ndjson
  rotation:
    maxSizeMB:  100
    maxAgeDays: 30
  exporters:
    local:         { enabled: true }
    aws:           { enabled: false }
    datadog:       { enabled: false }
    newrelic:      { enabled: false }
    elasticsearch: { enabled: false }
    loki:          { enabled: false }
    otlp:          { enabled: false }
    prometheus:    { enabled: false }
