apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karakuri.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "karakuri.labels" . | nindent 4 }}
spec:
  replicas: {{ if .Values.worker.enabled }}{{ .Values.worker.replicaCount }}{{ else }}{{ .Values.replicaCount }}{{ end }}
  selector:
    matchLabels:
      {{- include "karakuri.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "karakuri.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: karakuri
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: {{ .Values.secret.name }}
          {{- if or .Values.postgresql.enabled .Values.memory.vectorBackend .Values.worker.restate.ingressUrl .Values.worker.celery.brokerUrl }}
          env:
            {{- if .Values.worker.restate.ingressUrl }}
            - name: RESTATE_INGRESS_URL
              value: {{ .Values.worker.restate.ingressUrl | quote }}
            - name: RESTATE_SERVICE
              value: {{ .Values.worker.restate.service | quote }}
            - name: RESTATE_HANDLER
              value: {{ .Values.worker.restate.handler | quote }}
            {{- end }}
            {{- if .Values.worker.celery.brokerUrl }}
            - name: CELERY_BROKER_URL
              value: {{ .Values.worker.celery.brokerUrl | quote }}
            - name: CELERY_QUEUE
              value: {{ .Values.worker.celery.queue | quote }}
            - name: CELERY_TASK_NAME
              value: {{ .Values.worker.celery.taskName | quote }}
            {{- end }}
            {{- if .Values.postgresql.enabled }}
            - name: KARAKURI_DATABASE_DRIVER
              value: "postgres"
            - name: KARAKURI_DATABASE_DSN
              value: "host={{ .Values.postgresql.host }} port={{ .Values.postgresql.port }} user={{ .Values.postgresql.user }} dbname={{ .Values.postgresql.database }} sslmode={{ .Values.postgresql.sslmode }} password=$(PGPASSWORD)"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.passwordSecret.name }}
                  key: {{ .Values.postgresql.passwordSecret.key }}
            {{- end }}
            {{- if .Values.memory.vectorBackend }}
            - name: KARAKURI_MEMORY_VECTOR_BACKEND
              value: {{ .Values.memory.vectorBackend | quote }}
            - name: KARAKURI_MEMORY_EMBEDDING_DIM
              value: {{ .Values.memory.embeddingDim | quote }}
            {{- end }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/karakuri
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.livenessPath }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readinessPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "karakuri.fullname" . }}-data
        - name: config
          configMap:
            name: {{ include "karakuri.fullname" . }}-config
            items:
              - key: config.yaml
                path: config.yaml
