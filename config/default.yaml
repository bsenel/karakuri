server:
  addr: ":8080"

database:
  driver: sqlite
  dsn: karakuri.db

git:
  repo_path: .
  worktree_base: worktrees/
  base_branch: main
  branch_prefix: karakuri
  auto_prune: true

observability:
  exporters:
    - name: local
      enabled: true
      path: ./karakuri-obs/
      formats:
        metrics: ndjson
        logs: ndjson
      rotation:
        max_size_mb: 100
        max_age_days: 30

providers:
  default: claude
  fallback:
    gemini: claude
    cursor: claude
    copilot: claude

executor: local

auth:
  token: ""

domains:
  - id: software
    enabled: true

memory:
  consolidation_threshold: 20
  semantic_top_k: 5
  vector_backend: sqlite-keyword   # sqlite-keyword | pgvector  (pgvector requires database.driver=postgres)
  embedding_dim: 1536

# Tool adapters — multi-instance shape (ADR 006).
# Each slot carries a `default:` instance name and a map of named `instances:`.
# Use `<field>_env: ENV_VAR_NAME` to populate `<field>` from an environment
# variable at startup so checked-in YAML never holds plaintext credentials.
#
# Example multi-tenant config:
#   tools:
#     versioncontrol:
#       default: acme_github
#       instances:
#         acme_github:    { type: github, repo: acme/api, token_env: ACME_GITHUB_TOKEN }
#         personal_github: { type: github, repo: bsenel/sideproj, token_env: BSENEL_GITHUB_TOKEN }
#     email:
#       default: acme_outlook
#       instances:
#         acme_outlook:  { type: outlook, from_address: bot@acme.com, oauth_token_env: ACME_MS_TOKEN }
#         personal_gmail: { type: gmail, from_address: bsenel@gmail.com, oauth_token_env: BSENEL_GOOGLE_TOKEN }
tools:
  versioncontrol:
    default: ""
    instances: {}
  projectmgmt:
    default: ""
    instances: {}
  messaging:
    default: ""
    instances: {}
  design:
    default: ""
    instances: {}
  testing:
    default: ""
    instances: {}
  calendar:
    default: ""
    instances: {}
  email:
    default: ""
    instances: {}
  # CLI coding-agent slot (Phase 7). type: claude_code | cursor_cli | gemini_cli | copilot_cli
  # Each instance can override the CLI binary path via the `binary:` field;
  # default looks the binary up on PATH.
  cli_agents:
    default: ""
    instances: {}
