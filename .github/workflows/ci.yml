name: CI

# Gates branch protection on main: every PR must pass build + vet + test before
# it can be merged. Runs on push to main as well so the default branch always
# has a green status badge.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # The Go binary embeds the React SPA via //go:embed all:dist (web/embed.go).
  # web/dist/ is gitignored, so CI must build the frontend before any Go
  # target compiles. We do it once here and share the result with the three
  # Go jobs below via an artifact.
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # No lockfile committed yet; install resolves fresh each run. Once a
      # package-lock.json is generated against a modern Node and committed,
      # switch this back to `npm ci` + `cache: npm` for reproducibility.
      - run: npm install --no-audit --no-fund
        working-directory: web
      - run: npm run build
        working-directory: web
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1
          if-no-files-found: error

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: go build ./...

  vet:
    name: Vet
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: go vet ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: go test ./... -race -count=1 -timeout 5m
