version: 2
# Strategy: Dependabot opens PRs only for non-breaking updates. Major-version
# bumps require manual review (compat testing, peer-dep sweeps, migration
# notes) and are handled by maintainers rather than automated PRs.
updates:
  # Go modules — main Karakuri module plus any sub-modules added in Phase 14+.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: gomod
      include: scope
    labels:
      - dependencies
      - go
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # NPM for the embedded React frontend.
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: npm
      include: scope
    labels:
      - dependencies
      - frontend
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — pin to non-major bumps so action behavior stays stable.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: actions
      include: scope
    labels:
      - dependencies
      - ci
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
