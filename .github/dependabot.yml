version: 2
updates:
  # Go modules — main Karakuri module and any sub-modules added in Phase 14+.
  # The list expands as new modules ship (auth/, quota/, etc.).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: gomod
      include: scope
    labels:
      - dependencies
      - go
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  # NPM / pnpm for the embedded React frontend.
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: npm
      include: scope
    labels:
      - dependencies
      - frontend
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: actions
      include: scope
    labels:
      - dependencies
      - ci
